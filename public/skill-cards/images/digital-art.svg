<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Marker body (main barrel, diagonal) -->
  <g transform="rotate(-42, 100, 100)">
    <!-- Cap end (dark gray) -->
    <rect x="60" y="20" width="80" height="26" rx="13" fill="#555"/>
    <!-- Clip on cap -->
    <rect x="120" y="16" width="10" height="34" rx="4" fill="#444"/>
    <!-- Upper barrel section -->
    <rect x="60" y="44" width="80" height="18" rx="4" fill="#bbb"/>
    <!-- Main barrel body -->
    <rect x="60" y="60" width="80" height="75" rx="4" fill="#c8c8c8"/>
    <!-- Grip section (darker) -->
    <rect x="60" y="60" width="80" height="20" rx="3" fill="#aaa"/>
    <!-- Label window on barrel -->
    <rect x="70" y="85" width="60" height="28" rx="4" fill="#b8b8b8" stroke="#999" stroke-width="1.5"/>
    <!-- Oval cutout/window detail -->
    <ellipse cx="100" cy="99" rx="20" ry="10" fill="none" stroke="#888" stroke-width="2.5"/>
    <!-- Lower taper to tip -->
    <path d="M 60,135 L 140,135 L 135,160 L 65,160 Z" fill="#c0c0c0"/>
    <!-- Tip cone -->
    <path d="M 65,158 L 135,158 L 115,185 L 85,185 Z" fill="#aaa"/>
    <!-- Tip point -->
    <path d="M 85,183 L 115,183 L 100,198 Z" fill="#888"/>
    <!-- Stroke outlines for definition -->
    <rect x="60" y="20" width="80" height="165" rx="13" fill="none" stroke="#222" stroke-width="3.5"/>
    <line x1="60" y1="44" x2="140" y2="44" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="62" x2="140" y2="62" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="135" x2="140" y2="135" stroke="#222" stroke-width="2.5"/>
    <line x1="60" y1="158" x2="140" y2="158" stroke="#222" stroke-width="2.5"/>
  </g>
</svg>
