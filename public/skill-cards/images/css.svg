<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Code bracket top-left -->
  <text x="18" y="55" font-family="monospace" font-size="26" font-weight="bold" fill="#222">&lt;/&gt;</text>
  <!-- Dots (browser bar) -->
  <circle cx="170" cy="42" r="7" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="190" cy="42" r="7" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="210" cy="42" r="7" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="220" y1="42" x2="245" y2="42" stroke="#222" stroke-width="2.5"/>
  <circle cx="252" cy="42" r="7" fill="none" stroke="#222" stroke-width="2.5"/>
  <!-- CSS big text -->
  <text x="28" y="155" font-family="Arial Black, Impact, sans-serif" font-size="110" font-weight="900" fill="#e8890c" letter-spacing="-4">CSS</text>
  <!-- Horizontal lines (code) -->
  <line x1="18" y1="105" x2="55" y2="105" stroke="#222" stroke-width="3"/>
  <line x1="18" y1="118" x2="62" y2="118" stroke="#222" stroke-width="3"/>
  <line x1="18" y1="131" x2="48" y2="131" stroke="#222" stroke-width="3"/>
  <!-- Arrow icon -->
  <line x1="60" y1="155" x2="90" y2="155" stroke="#222" stroke-width="3"/>
  <polygon points="90,149 100,155 90,161" fill="#222"/>
  <!-- File icon right -->
  <rect x="238" y="118" width="42" height="52" rx="3" fill="none" stroke="#222" stroke-width="2.5"/>
  <polyline points="256,118 256,136 278,136" fill="none" stroke="#222" stroke-width="2.5"/>
  <line x1="245" y1="145" x2="272" y2="145" stroke="#222" stroke-width="2"/>
  <line x1="245" y1="155" x2="272" y2="155" stroke="#222" stroke-width="2"/>
  <line x1="245" y1="165" x2="260" y2="165" stroke="#222" stroke-width="2"/>
  <!-- Pencil bottom-left -->
  <rect x="35" y="168" width="70" height="12" rx="6" fill="none" stroke="#222" stroke-width="2.5"/>
  <circle cx="30" cy="174" r="6" fill="none" stroke="#222" stroke-width="2.5"/>
</svg>
