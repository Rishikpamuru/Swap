<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200">
  <!-- Y axis -->
  <line x1="45" y1="170" x2="45" y2="15" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <!-- Y axis arrow -->
  <polygon points="45,10 39,24 51,24" fill="#111"/>
  <!-- X axis -->
  <line x1="45" y1="150" x2="245" y2="150" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <!-- X axis arrow -->
  <polygon points="250,150 236,144 236,156" fill="#111"/>
  <!-- Y axis ticks -->
  <line x1="40" y1="120" x2="50" y2="120" stroke="#111" stroke-width="2"/>
  <line x1="40" y1="90" x2="50" y2="90" stroke="#111" stroke-width="2"/>
  <line x1="40" y1="60" x2="50" y2="60" stroke="#111" stroke-width="2"/>
  <!-- X axis ticks -->
  <line x1="85" y1="145" x2="85" y2="155" stroke="#111" stroke-width="2"/>
  <line x1="125" y1="145" x2="125" y2="155" stroke="#111" stroke-width="2"/>
  <line x1="165" y1="145" x2="165" y2="155" stroke="#111" stroke-width="2"/>
  <line x1="205" y1="145" x2="205" y2="155" stroke="#111" stroke-width="2"/>
  <!-- Curve: rises, peaks, dips, then falls off -->
  <path d="M 50,148
           C 70,148 75,60 100,55
           C 125,50 135,120 155,130
           C 175,140 190,148 245,148"
        fill="none" stroke="#111" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- F(x) label -->
  <text x="148" y="85" font-family="Georgia, serif" font-size="30" font-style="italic" font-weight="bold" fill="#111">F</text>
  <text x="167" y="85" font-family="Georgia, serif" font-size="22" fill="#111">(</text>
  <text x="174" y="85" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#111">x</text>
  <text x="187" y="85" font-family="Georgia, serif" font-size="22" fill="#111">)</text>
  <!-- Circle around F(x) -->
  <ellipse cx="175" cy="76" rx="34" ry="22" fill="none" stroke="#111" stroke-width="2"/>
</svg>
