  <!-- J letter -->
  <text x="10" y="78" font-family="Impact, Arial Black, sans-serif" font-size="58" font-weight="900" fill="white">J</text>
  <!-- S letter -->
  <text x="53" y="78" font-family="Impact, Arial Black, sans-serif" font-size="58" font-weight="900" fill="white">S</text>
</svg>
